<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpendMap — Login</title>
  <meta name="description" content="SpendMap: Track your daily expenses visually. Built for college students on a budget.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="auth-page" style="position: relative;">
  <!-- Theme Toggle -->
  <button onclick="handleThemeToggle()" style="position: absolute; top: 24px; right: 24px; width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--color-border); background: var(--color-bg-secondary); color: var(--color-text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease;">
    <span class="material-symbols-outlined" id="theme-icon" style="font-size: 20px;">light_mode</span>
  </button>

  <!-- Branding -->
  <div style="text-align:center">
    <div class="auth-logo" style="display: flex; align-items: center; justify-content: center;"><span class="material-symbols-outlined" style="color: var(--color-accent); margin-right: 8px;">insights</span>SpendMap</div>
    <div class="auth-tagline">Track where it all went.<br>No lectures. No judgment.</div>
  </div>

  <!-- Auth Card -->
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login"  onclick="switchTab('login')">Login</button>
      <button class="auth-tab"        id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- LOGIN -->
    <form class="auth-form active" id="form-login" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn">Login</button>
      <div class="error-msg" id="login-error"></div>
    </form>

    <!-- SIGNUP -->
    <form class="auth-form" id="form-signup" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label for="signup-name">Full Name</label>
        <input type="text" id="signup-name" placeholder="Your name" required autocomplete="name">
      </div>
      <div class="form-group">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" placeholder="Minimum 8 characters" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="signup-btn">Create Account</button>
      <div class="error-msg" id="signup-error"></div>
    </form>
  </div>

  <div style="text-align:center; padding: 20px; font-size: var(--text-xs); color: var(--color-text-disabled); margin-top: 40px;">© 2026 SpendMap. Built by Utkarsh Anand.</div>
</div>

<!-- Onboarding Modal (shown after first signup) -->
<div class="modal-overlay" id="onboarding-overlay">
  <div class="modal">
    <div class="modal-title">Set up your SpendMap 🗺️</div>
    <div class="modal-subtitle">30 seconds. Everything can be changed later in Settings.</div>
    <form onsubmit="handleOnboarding(event)">
      <div class="form-group">
        <label for="ob-monthly">Monthly Budget (₹)</label>
        <input type="number" id="ob-monthly" placeholder="e.g. 6000" min="0" max="999999">
      </div>
      <div class="form-group">
        <label for="ob-weekly">Weekly Budget (₹) <span style="color:var(--color-text-disabled)">(optional)</span></label>
        <input type="number" id="ob-weekly" placeholder="e.g. 1500" min="0" max="99999">
      </div>
      <div class="form-group">
        <label for="ob-upi">UPI ID <span style="color:var(--color-text-disabled)">(optional — for V2 auto-tracking)</span></label>
        <input type="text" id="ob-upi" placeholder="user@bankname">
      </div>
      <button type="submit" class="btn btn-primary btn-full mt-4">Get Started →</button>
      <button type="button" class="btn btn-secondary btn-full mt-2" onclick="skipOnboarding()">Skip for now</button>
    </form>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
  redirectIfLoggedIn();

  function initLoginTheme() {
    const icon = document.getElementById('theme-icon');
    if (localStorage.getItem('sm_theme') === 'light') {
      icon.textContent = 'dark_mode';
      document.documentElement.classList.add('light');
    }
  }
  initLoginTheme();

  function handleThemeToggle() {
    const isLight = toggleTheme(); // From app.js
    document.getElementById('theme-icon').textContent = isLight ? 'dark_mode' : 'light_mode';
  }

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.toggle('active', t.id === `tab-${tab}`));
    document.querySelectorAll('.auth-form').forEach(f => f.classList.toggle('active', f.id === `form-${tab}`));
  }

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('login-error');
    err.classList.remove('visible');
    btn.disabled = true; btn.textContent = 'Logging in…';

    try {
      const data = await API.login({
        email:    document.getElementById('login-email').value,
        password: document.getElementById('login-password').value,
      });
      localStorage.setItem('sm_token', data.token);
      saveUser(data.user);
      window.location.href = '/dashboard.html';
    } catch (ex) {
      err.textContent = ex.message; err.classList.add('visible');
      btn.disabled = false; btn.textContent = 'Login';
    }
  }

  async function handleSignup(e) {
    e.preventDefault();
    const btn = document.getElementById('signup-btn');
    const err = document.getElementById('signup-error');
    err.classList.remove('visible');
    btn.disabled = true; btn.textContent = 'Creating account…';

    try {
      const data = await API.signup({
        name:     document.getElementById('signup-name').value,
        email:    document.getElementById('signup-email').value,
        password: document.getElementById('signup-password').value,
      });
      localStorage.setItem('sm_token', data.token);
      saveUser(data.user);
      document.getElementById('onboarding-overlay').classList.add('open');
    } catch (ex) {
      err.textContent = ex.message; err.classList.add('visible');
      btn.disabled = false; btn.textContent = 'Create Account';
    }
  }

  async function handleOnboarding(e) {
    e.preventDefault();
    try {
      await API.updateProfile({
        monthlyBudget:      Number(document.getElementById('ob-monthly').value) || 0,
        weeklyBudget:       Number(document.getElementById('ob-weekly').value)  || 0,
        upiId:              document.getElementById('ob-upi').value || '',
        onboardingComplete: true,
      });
    } catch { /* non-blocking */ }
    window.location.href = '/dashboard.html';
  }

  function skipOnboarding() {
    API.updateProfile({ onboardingComplete: true }).catch(() => {});
    window.location.href = '/dashboard.html';
  }
</script>
</body>
</html>
